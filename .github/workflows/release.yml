name: release-please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      ts-client--release_created: ${{ steps.release.outputs['ts-client--release_created'] }}
      ts-client--tag_name: ${{ steps.release.outputs['ts-client--tag_name'] }}
      zod-client--release_created: ${{ steps.release.outputs['zod-client--release_created'] }}
      zod-client--tag_name: ${{ steps.release.outputs['zod-client--tag_name'] }}
      plato_client_ruby--release_created: ${{ steps.release.outputs['plato_client_ruby--release_created'] }}
      plato_client_ruby--tag_name: ${{ steps.release.outputs['plato_client_ruby--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE }}

  publish-ts-client:
    needs: release-please
    if: needs.release-please.outputs['ts-client--release_created']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs['ts-client--tag_name'] }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
      - run: cd typescript && npm ci && npm run build && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-zod-client:
    needs: release-please
    if: needs.release-please.outputs['zod-client--release_created']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs['zod-client--tag_name'] }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
      - run: cd zod && npm ci && npm run build && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-ruby-client:
    needs: release-please
    if: needs.release-please.outputs['plato_client_ruby--release_created']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs['plato_client_ruby--tag_name'] }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Publish to GitHub Packages
        run: |
          mkdir -p ~/.gem
          echo ':github: Bearer ${{ secrets.GITHUB_TOKEN }}' > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          cd ruby && gem build plato_client.gemspec
          gem push --key github --host https://rubygems.pkg.github.com/platoorg plato_client-*.gem

  # Go: no publish step needed — consumers reference github.com/platoorg/plato-clients/go
  # directly; the git tag created by release-please is sufficient.

  # Rust: GitHub Packages does not support Cargo — publish to crates.io when ready.
  # Elixir: GitHub Packages does not support Hex — publish to hex.pm when ready.
